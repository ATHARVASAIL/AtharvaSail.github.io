<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atharva Sail | Secure OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020202;
            --term-bg: rgba(5, 5, 10, 0.85);
            --green: #0f0;
            --green-dim: #008f11;
            --cyan: #0ff;
            --red: #ff003c;
            --scanline: rgba(0, 255, 0, 0.05);
            --glow: 0 0 10px var(--green), 0 0 20px var(--green-dim);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg); color: var(--green); font-family: 'Fira Code', monospace;
            height: 100vh; height: 100dvh; overflow: hidden; user-select: none;
        }

        /* CRT Effects */
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        .crt::after {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%);
            z-index: 1000; pointer-events: none;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.25; pointer-events: none; }

        /* Boot Screen */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000;
            z-index: 5000; padding: 20px; color: var(--green); font-size: 1.2rem;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        /* OS Interface */
        .os-container { 
            position: relative; z-index: 10; height: 100%; display: flex; 
            align-items: center; justify-content: center; opacity: 0; transition: opacity 1s; 
        }
        
        .window {
            width: 90%; max-width: 1200px; height: 85vh; background: var(--term-bg);
            border: 1px solid var(--green); box-shadow: var(--glow); border-radius: 4px;
            display: flex; flex-direction: column; backdrop-filter: blur(10px);
            position: absolute; overflow: hidden;
        }

        .title-bar {
            background: var(--green); color: #000; padding: 5px 15px; font-weight: bold;
            display: flex; justify-content: space-between; cursor: grab; user-select: none;
            flex-shrink: 0;
        }

        .window-content { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 250px; border-right: 1px solid var(--green-dim); padding: 15px;
            display: flex; flex-direction: column; gap: 10px; background: rgba(0,255,0,0.02);
            flex-shrink: 0;
        }
        .sys-info { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed var(--green-dim); }
        .sys-info h2 { color: #fff; text-shadow: 0 0 5px #fff; letter-spacing: 2px; }
        
        .nav-btn {
            background: transparent; border: 1px solid transparent; color: var(--green);
            padding: 8px 10px; text-align: left; font-family: inherit; font-size: 1rem;
            cursor: pointer; transition: 0.2s; position: relative; white-space: nowrap;
        }
        .nav-btn:hover, .nav-btn.active { border-color: var(--green); background: rgba(0,255,0,0.1); padding-left: 20px; }

        .terminal { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; cursor: text;}
        .output-area { flex: 1; overflow-y: auto; padding-bottom: 20px; scroll-behavior: smooth; }
        .output-block { margin-bottom: 20px; animation: slideUp 0.3s ease-out; }
        
        .cmd-echo { color: var(--cyan); margin-bottom: 10px; }
        .cmd-echo::before { content: 'guest@sail-os:~$ '; color: var(--green); }

        .input-area { display: flex; align-items: center; border-top: 1px solid var(--green-dim); padding-top: 15px; flex-shrink: 0;}
        .prompt { color: var(--green); margin-right: 10px; font-weight: bold; }
        input[type="text"] {
            flex: 1; background: transparent; border: none; color: var(--cyan);
            font-family: 'Fira Code', monospace; font-size: 16px; 
            outline: none; text-shadow: 0 0 5px var(--cyan);
        }

        /* Animations */
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink-red { 0% { opacity: 0.2; } 50% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Content Styling */
        h1, h2, h3 { color: #fff; margin-bottom: 10px; text-transform: uppercase; font-size: 1.2rem; }
        p, li { color: #ccc; margin-bottom: 8px; line-height: 1.5; font-size: 0.95rem;}
        ul { list-style-type: square; margin-left: 20px; }
        .highlight { color: var(--cyan); }
        .danger { color: var(--red); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .box { border: 1px dashed var(--green-dim); padding: 15px; background: rgba(0,0,0,0.5); }
        a { color: var(--cyan); text-decoration: none; border-bottom: 1px solid var(--cyan); }
        
        @media (max-width: 800px) {
            .window { width: 100%; height: 100dvh; position: static !important; transform: none !important; margin: 0 !important; border: none; }
            .window-content { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--green); flex-direction: row; overflow-x: auto; }
            .sys-info { display: none; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body class="crt">

    <canvas id="matrix"></canvas>

    <div id="boot-screen">
        <div id="boot-text"></div>
    </div>

    <div class="os-container" id="os">
        <div class="window" id="terminal-window">
            <div class="title-bar" id="drag-handle">
                <span>root@sail-core ~ /bin/bash</span>
                <span style="cursor: pointer;" onclick="window.location.reload()">[ REBOOT ]</span>
            </div>
            <div class="window-content">
                <aside class="sidebar">
                    <div class="sys-info">
                        <h2>A.SAIL</h2>
                        <span class="highlight">VAPT Analyst</span><br>
                    </div>
                    <button class="nav-btn" onclick="executeCmd('whoami')">whoami</button>
                    <button class="nav-btn" onclick="executeCmd('experience')">experience</button>
                    <button class="nav-btn" onclick="executeCmd('skills')">skills</button>
                    <button class="nav-btn" onclick="executeCmd('projects')">projects</button>
                    <button class="nav-btn" onclick="executeCmd('sudo')">sudo</button>
                    <button class="nav-btn" onclick="executeCmd('contact')">contact</button>
                    <button class="nav-btn danger" onclick="executeCmd('clear')">clear</button>
                </aside>

                <main class="terminal">
                    <div class="output-area" id="output"></div>
                    <div class="input-area">
                        <span class="prompt">guest@sail:~$</span>
                        <input type="text" id="cli" autocomplete="off" spellcheck="false">
                    </div>
                </main>
            </div>
        </div>
    </div>

    <template id="tpl-welcome">
        <h2>System Initialized.</h2>
        <p>Welcome to SAIL-OS v2.0. Type <span class="highlight">'help'</span> for commands.</p>
    </template>

    <template id="tpl-whoami">
        <h1>Atharva Sail</h1>
        <p class="highlight">>> VAPT Analyst & Security Researcher</p>
        <p>Expertise in Web, Mobile, and Network VAPT. 6+ months experience at Anzen Technologies.</p>
    </template>

    <template id="tpl-experience">
        <h3>[ WORK_LOGS ]</h3>
        <div class="box">
            <h2 class="highlight">Junior VAPT Intern</h2>
            <p>Anzen Technologies | Oct 2025 - May 2026</p>
            <ul>
                <li>Secured assets for Aditya Birla, Anand Rathi, MSE.</li>
                <li>API & LLM Security Testing.</li>
            </ul>
        </div>
    </template>

    <template id="tpl-sudo">
        <div id="hacked-payload" style="text-align: center; border: 2px solid var(--red); padding: 20px; background: rgba(255,0,0,0.1);">
            <h2 class="danger" style="animation: blink-red 0.1s infinite; font-size: 1.8rem;">[!] CRITICAL SYSTEM BREACH [!]</h2>
            <p class="danger" style="margin: 15px 0;">ENCRYPTING LOCAL FILESYSTEM...</p>
            <div id="hacked-progress" style="color: var(--red); font-family: monospace; margin-bottom: 10px;"></div>
            <h1 id="hacked-main-text" style="color: #fff; text-shadow: 0 0 20px #f00; font-size: 2.5rem;">YOU ARE HACKED</h1>
            <p id="hacked-sub-text" style="color: var(--red); margin-top: 10px;">ROOT ACCESS GRANTED TO: FLASH_EXPLOIT_v4.2</p>
        </div>
    </template>

    <template id="tpl-nmap">
        <p class="highlight">Nmap 7.92 scan report for atharvasail.github.io</p>
        <p>PORT STATE SERVICE</p>
        <p>80/tcp open http</p>
        <p>443/tcp open https</p>
    </template>

    <template id="tpl-contact">
        <h3>[ CONTACT ]</h3>
        <p>Email: <a href="mailto:atharvasail106@gmail.com">atharvasail106@gmail.com</a></p>
        <p>LinkedIn: <a href="https://linkedin.com/in/atharvasail" target="_blank">in/atharvasail</a></p>
    </template>

    <script>
        // --- 1. Boot Logic ---
        const bootLines = ["Init kernel...", "Loading drivers [OK]", "Establishing Link [OK]", "Welcome, Admin."];
        const bootScreen = document.getElementById('boot-text');
        let bootDelay = 0;
        bootLines.forEach(l => {
            setTimeout(() => { bootScreen.innerHTML += `<div>${l}</div>`; }, bootDelay);
            bootDelay += 400;
        });
        setTimeout(() => {
            document.getElementById('boot-screen').style.display = 'none';
            document.getElementById('os').style.opacity = '1';
            document.getElementById('cli').focus();
            executeCmd('welcome');
        }, bootDelay + 500);

        // --- 2. Terminal Logic ---
        const cli = document.getElementById('cli');
        const outputArea = document.getElementById('output');
        let isLocked = false;

        cli.addEventListener('keydown', (e) => {
            if (isLocked) { e.preventDefault(); return; }
            if (e.key === 'Enter') {
                const cmd = cli.value.trim().toLowerCase();
                if (cmd) executeCmd(cmd);
                cli.value = '';
            }
        });

        function executeCmd(cmd) {
            if (cmd === 'clear') { outputArea.innerHTML = ''; return; }

            const echo = document.createElement('div');
            echo.className = 'cmd-echo';
            echo.textContent = cmd;
            outputArea.appendChild(echo);

            const block = document.createElement('div');
            block.className = 'output-block';

            if (cmd === 'sudo') {
                isLocked = true;
                const template = document.getElementById('tpl-sudo');
                block.appendChild(template.content.cloneNode(true));
                outputArea.appendChild(block);

                const payload = block.querySelector('#hacked-payload');
                const mainText = block.querySelector('#hacked-main-text');
                const subText = block.querySelector('#hacked-sub-text');
                const progress = block.querySelector('#hacked-progress');

                let p = 0;
                const interval = setInterval(() => {
                    p += 10;
                    progress.textContent = `PROGRESS: [${'#'.repeat(p/5)}${'.'.repeat(20-p/5)}] ${p}%`;
                    if(p >= 100) clearInterval(interval);
                }, 300);

                setTimeout(() => {
                    payload.style.borderColor = 'var(--cyan)';
                    payload.style.background = 'rgba(0,255,255,0.05)';
                    mainText.style.color = 'var(--cyan)';
                    mainText.textContent = "JUST KIDDING!";
                    subText.style.color = 'var(--green)';
                    subText.textContent = "Access Denied: You are not in the sudoers file. Relax, Admin.";
                    progress.style.display = 'none';
                    isLocked = false;
                    cli.focus();
                }, 10000);

            } else if (cmd === 'help') {
                block.innerHTML = `<p>Commands: <span class="highlight">whoami, experience, skills, projects, nmap, sudo, contact, clear</span></p>`;
                outputArea.appendChild(block);
            } else {
                const template = document.getElementById(`tpl-${cmd}`);
                if (template) block.appendChild(template.content.cloneNode(true));
                else block.innerHTML = `<p class="danger">bash: ${cmd}: command not found.</p>`;
                outputArea.appendChild(block);
            }
            outputArea.scrollTop = outputArea.scrollHeight;
        }

        // --- 3. Matrix Rain ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%';
        const fontSize = 14;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = Array.from({length: columns}, () => 1);
        function drawMatrix() {
            ctx.fillStyle = 'rgba(2, 2, 2, 0.1)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0f0'; ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 40);
    </script>
</body>
